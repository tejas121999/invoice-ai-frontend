<div>
  <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Invoice history</h1>
  <p class="mt-1 text-slate-600 dark:text-slate-400">Search and filter processed invoices.</p>

  <div class="mt-6 flex flex-col gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900 sm:flex-row sm:items-end">
    <div class="flex-1">
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="q">Search</label>
      <input
        id="q"
        type="search"
        class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm dark:border-slate-600 dark:bg-slate-950 dark:text-white"
        placeholder="Vendor or ID"
        [ngModel]="query()"
        (ngModelChange)="onQueryInput($event)"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="from">From</label>
      <input
        id="from"
        type="date"
        class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm dark:border-slate-600 dark:bg-slate-950 dark:text-white"
        [ngModel]="from()"
        (ngModelChange)="from.set($event); applyFilters()"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="to">To</label>
      <input
        id="to"
        type="date"
        class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm dark:border-slate-600 dark:bg-slate-950 dark:text-white"
        [ngModel]="to()"
        (ngModelChange)="to.set($event); applyFilters()"
      />
    </div>
  </div>

  <div class="mt-6 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-800">
      <thead class="bg-slate-50 dark:bg-slate-950">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">ID</th>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Vendor</th>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Amount</th>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">Date</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
        @for (row of rows(); track row.id) {
          <tr>
            <td class="px-4 py-3 text-sm text-slate-900 dark:text-slate-100">{{ row.id }}</td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">{{ row.vendor }}</td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">{{ row.amount | number: '1.2-2' }}</td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">{{ row.date }}</td>
          </tr>
        } @empty {
          <tr>
            <td class="px-4 py-6 text-sm text-slate-500" colspan="4">No invoices match your filters.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
