<div class="mx-auto max-w-2xl">
  <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Review invoice</h1>
  <p class="mt-1 text-slate-600 dark:text-slate-400">Invoice ID: {{ invoiceId() || '—' }}</p>

  <form class="mt-6 space-y-4 rounded-xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900" [formGroup]="form">
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="vendor">Vendor</label>
      <input
        id="vendor"
        type="text"
        formControlName="vendor"
        class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm dark:border-slate-600 dark:bg-slate-950 dark:text-white"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="invoiceNumber">Invoice #</label>
      <input
        id="invoiceNumber"
        type="text"
        formControlName="invoiceNumber"
        class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm dark:border-slate-600 dark:bg-slate-950 dark:text-white"
      />
    </div>
    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="amount">Amount</label>
        <input
          id="amount"
          type="number"
          formControlName="amount"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm dark:border-slate-600 dark:bg-slate-950 dark:text-white"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="date">Date</label>
        <input
          id="date"
          type="date"
          formControlName="date"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm dark:border-slate-600 dark:bg-slate-950 dark:text-white"
        />
      </div>
    </div>
    <div class="flex gap-3 pt-2">
      <button
        type="button"
        class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-500"
        (click)="saveDraft()"
      >
        Save draft
      </button>
    </div>
  </form>
</div>
