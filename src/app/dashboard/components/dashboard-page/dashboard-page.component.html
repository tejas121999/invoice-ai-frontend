<div>
  <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Dashboard</h1>
  <p class="mt-1 text-slate-600 dark:text-slate-400">Summary of invoice activity and processing health.</p>
  <div class="mt-6 grid grid-cols-3 gap-4">
    @for (w of widgets; track w.title) {
      <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">{{ w.title }}</p>
        <p class="mt-2 text-3xl font-semibold tracking-tight text-slate-900 dark:text-white">{{ w.value }}</p>
        <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">{{ w.hint }}</p>
      </div>
    }
  </div>
</div>
