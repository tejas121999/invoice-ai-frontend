<aside

>
  <a
    routerLink="/dashboard"
    routerLinkActive="bg-white font-medium text-slate-900 shadow-sm dark:bg-slate-800 dark:text-white"
    [routerLinkActiveOptions]="{ exact: true }"
    class="rounded-md px-2.5 py-1.5 text-sm text-slate-600 hover:bg-white/80 dark:text-slate-300 dark:hover:bg-slate-800/80"
  >
    Dashboard
  </a>
  <a
    routerLink="/upload"
    routerLinkActive="bg-white font-medium text-slate-900 shadow-sm dark:bg-slate-800 dark:text-white"
    class="rounded-md px-2.5 py-1.5 text-sm text-slate-600 hover:bg-white/80 dark:text-slate-300 dark:hover:bg-slate-800/80"
  >
    Upload
  </a>
  <a
    routerLink="/history"
    routerLinkActive="bg-white font-medium text-slate-900 shadow-sm dark:bg-slate-800 dark:text-white"
    class="rounded-md px-2.5 py-1.5 text-sm text-slate-600 hover:bg-white/80 dark:text-slate-300 dark:hover:bg-slate-800/80"
  >
    History
  </a>
