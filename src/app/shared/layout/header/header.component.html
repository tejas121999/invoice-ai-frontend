<header
  class="flex h-14 shrink-0 items-center justify-between border-b border-slate-200 bg-white px-4 shadow-sm dark:border-slate-800 dark:bg-slate-950"
>
  <a routerLink="/dashboard" class="text-lg font-semibold tracking-tight text-slate-900 dark:text-slate-100">
    {{ appName }}
  </a>
  <div class="flex items-center gap-3">
    <span class="hidden text-sm text-slate-600 sm:inline dark:text-slate-400">Signed in</span>
    <button
      type="button"
      class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
      (click)="signOut()"
    >
      Sign out
    </button>
  </div>
</header>
