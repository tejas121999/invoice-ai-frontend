<div class="flex min-h-dvh items-center justify-center bg-slate-100 px-4 dark:bg-slate-950">
  <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <h1 class="text-xl font-semibold text-slate-900 dark:text-white">Sign in</h1>
    <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">Use any valid email and password (6+ chars) for this demo.</p>
    <form class="mt-6 flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="username"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:border-slate-600 dark:bg-slate-950 dark:text-white"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <p class="mt-1 text-sm text-red-600">Enter a valid email.</p>
        }
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:border-slate-600 dark:bg-slate-950 dark:text-white"
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <p class="mt-1 text-sm text-red-600">Password must be at least 6 characters.</p>
        }
      </div>
      <button
        type="submit"
        class="mt-2 rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      >
        Continue
      </button>
    </form>
  </div>
</div>
